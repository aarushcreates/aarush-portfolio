<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AARUSH | Devil May Cry Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Teko:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Teko', sans-serif;
            overflow: hidden;
            background: #0a0a0f;
            color: #fff;
            height: 100vh;
            width: 100vw;
        }

        /* Cinematic Background */
        .background-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -3;
            background: 
                linear-gradient(rgba(10, 10, 15, 0.7), rgba(5, 5, 10, 0.9)),
                url('https://images.unsplash.com/photo-1519074069444-1ba4fff66d16?w=1920&q=80') center/cover no-repeat;
            filter: contrast(1.2) brightness(0.6);
        }

        /* Particle Canvas */
        #particle-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -2;
            pointer-events: none;
        }

        /* Main Container */
        .main-container {
            display: flex;
            height: 100vh;
            width: 100vw;
            position: relative;
            z-index: 1;
        }

        /* Left Side - Menu */
        .left-panel {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 8vw;
            background: linear-gradient(90deg, rgba(0,0,0,0.8) 0%, rgba(0,0,0,0.4) 100%);
            position: relative;
        }

        /* AARUSH Title - AAA Metallic Style */
        .title-container {
            margin-bottom: 60px;
            position: relative;
        }

        .aarush-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(4rem, 8vw, 10rem);
            font-weight: 900;
            letter-spacing: 8px;
            text-transform: uppercase;
            background: linear-gradient(
                135deg,
                #e8e8e8 0%,
                #ffffff 20%,
                #c0c0c0 40%,
                #ffffff 50%,
                #a0a0a0 60%,
                #d0d0d0 80%,
                #f0f0f0 100%
            );
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: metallicShimmer 3s ease-in-out infinite;
            position: relative;
            filter: drop-shadow(0 0 10px rgba(255, 0, 50, 0.8))
                    drop-shadow(0 0 20px rgba(0, 255, 255, 0.6))
                    drop-shadow(2px 2px 0px rgba(255, 0, 50, 0.9))
                    drop-shadow(-2px -2px 0px rgba(0, 255, 255, 0.7));
        }

        .aarush-title::before {
            content: 'AARUSH';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                45deg,
                transparent 40%,
                rgba(255, 0, 50, 0.3) 50%,
                transparent 60%
            );
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: glareEffect 4s ease-in-out infinite;
            pointer-events: none;
        }

        @keyframes metallicShimmer {
            0%, 100% { background-position: 0% center; }
            50% { background-position: 100% center; }
        }

        @keyframes glareEffect {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        /* Wing Effects */
        .wing-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 200%;
            pointer-events: none;
            z-index: -1;
        }

        .wing-left {
            position: absolute;
            left: -60%;
            top: 20%;
            width: 80px;
            height: 200px;
            background: linear-gradient(135deg, rgba(255, 0, 50, 0.6), transparent 70%);
            clip-path: polygon(0 50%, 100% 0, 80% 100%);
            filter: blur(8px);
            animation: wingPulse 2s ease-in-out infinite;
        }

        .wing-right {
            position: absolute;
            right: -60%;
            top: 20%;
            width: 80px;
            height: 200px;
            background: linear-gradient(225deg, rgba(0, 255, 255, 0.6), transparent 70%);
            clip-path: polygon(0 0, 100% 50%, 20% 100%);
            filter: blur(8px);
            animation: wingPulse 2s ease-in-out infinite reverse;
        }

        @keyframes wingPulse {
            0%, 100% { opacity: 0.6; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); }
        }

        /* Menu Buttons */
        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .menu-btn {
            font-family: 'Teko', sans-serif;
            font-size: clamp(2rem, 3.5vw, 3.5rem);
            font-weight: 700;
            letter-spacing: 4px;
            text-transform: uppercase;
            color: #fff;
            background: transparent;
            border: none;
            cursor: pointer;
            position: relative;
            padding: 10px 30px;
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.5);
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #ff0032, #00ffff);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-btn::after {
            content: '';
            position: absolute;
            top: 0;
            right: 0;
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #00ffff, #ff0032);
            transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .menu-btn:hover {
            transform: scale(1.08) translateX(15px);
            text-shadow: 
                0 0 20px rgba(255, 0, 50, 0.9),
                0 0 40px rgba(0, 255, 255, 0.7),
                3px 0 0 rgba(255, 0, 50, 1),
                -3px 0 0 rgba(0, 255, 255, 1);
            letter-spacing: 6px;
        }

        .menu-btn:hover::before,
        .menu-btn:hover::after {
            width: 100%;
        }

        /* Right Side - Mini Game */
        .right-panel {
            width: 50%;
            position: relative;
            background: linear-gradient(90deg, rgba(0,0,0,0.4) 0%, rgba(0,0,0,0.6) 100%);
            overflow: hidden;
        }

        #game-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }

        .game-overlay {
            position: absolute;
            bottom: 30px;
            right: 30px;
            font-size: 1.2rem;
            color: rgba(255, 255, 255, 0.6);
            text-align: right;
            pointer-events: none;
        }

        .game-overlay span {
            display: block;
            margin-top: 5px;
        }

        /* Loadout Screen */
        .loadout-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(5, 5, 10, 0.98);
            z-index: 100;
            transform: translateX(100%);
            transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        .loadout-screen.active {
            transform: translateX(0);
        }

        .loadout-content {
            max-width: 800px;
            padding: 40px;
            text-align: center;
        }

        .loadout-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(2.5rem, 5vw, 4rem);
            color: #fff;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 0, 50, 0.8);
            letter-spacing: 4px;
        }

        .about-section {
            margin-bottom: 50px;
        }

        .about-text {
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            line-height: 1.8;
            color: #ccc;
            max-width: 600px;
            margin: 0 auto;
        }

        .projects-section {
            margin-bottom: 50px;
        }

        .project-links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            align-items: center;
        }

        .project-link {
            font-family: 'Teko', sans-serif;
            font-size: clamp(1.5rem, 2.5vw, 2rem);
            color: #00ffff;
            text-decoration: none;
            padding: 15px 40px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            background: rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            position: relative;
            overflow: hidden;
        }

        .project-link::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.2), transparent);
            transition: left 0.5s ease;
        }

        .project-link:hover {
            border-color: #ff0032;
            background: rgba(255, 0, 50, 0.1);
            color: #ff0032;
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.4);
        }

        .project-link:hover::before {
            left: 100%;
        }

        .back-btn {
            font-family: 'Teko', sans-serif;
            font-size: clamp(1.5rem, 2.5vw, 2rem);
            color: #fff;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 15px 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 3px;
            text-transform: uppercase;
        }

        .back-btn:hover {
            border-color: #ff0032;
            background: rgba(255, 0, 50, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 50, 0.5);
        }

        /* Contact Modal */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 200;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            visibility: hidden;
            transition: all 0.4s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }

        .modal-content {
            background: linear-gradient(135deg, rgba(20, 20, 30, 0.95), rgba(10, 10, 15, 0.98));
            padding: 60px 80px;
            border: 1px solid rgba(255, 0, 50, 0.3);
            box-shadow: 
                0 0 50px rgba(255, 0, 50, 0.3),
                inset 0 0 50px rgba(0, 0, 0, 0.5);
            text-align: center;
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-title {
            font-family: 'Cinzel Decorative', cursive;
            font-size: clamp(2rem, 4vw, 3rem);
            color: #ff0032;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 0, 50, 0.8);
            letter-spacing: 3px;
        }

        .contact-link {
            font-family: 'Teko', sans-serif;
            font-size: clamp(1.5rem, 2.5vw, 2rem);
            color: #00ffff;
            text-decoration: none;
            display: inline-block;
            padding: 15px 40px;
            border: 2px solid rgba(0, 255, 255, 0.3);
            background: rgba(0, 255, 255, 0.05);
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
            margin-bottom: 40px;
        }

        .contact-link:hover {
            border-color: #ff0032;
            background: rgba(255, 0, 50, 0.1);
            color: #ff0032;
            box-shadow: 0 0 30px rgba(255, 0, 50, 0.4);
        }

        .close-btn {
            font-family: 'Teko', sans-serif;
            font-size: clamp(1.2rem, 2vw, 1.5rem);
            color: #fff;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            padding: 12px 40px;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .close-btn:hover {
            border-color: #ff0032;
            background: rgba(255, 0, 50, 0.2);
            box-shadow: 0 0 20px rgba(255, 0, 50, 0.5);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .left-panel,
            .right-panel {
                width: 100%;
                height: 50vh;
            }

            .left-panel {
                padding-left: 5vw;
                justify-content: center;
            }

            .title-container {
                margin-bottom: 30px;
            }

            .menu-buttons {
                gap: 15px;
            }

            .game-overlay {
                bottom: 15px;
                right: 15px;
                font-size: 0.9rem;
            }

            .modal-content {
                padding: 40px 30px;
                margin: 20px;
            }
        }

        /* Scanlines Effect */
        .scanlines {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 1000;
            background: repeating-linear-gradient(
                0deg,
                rgba(0, 0, 0, 0.1),
                rgba(0, 0, 0, 0.1) 1px,
                transparent 1px,
                transparent 2px
            );
            opacity: 0.3;
        }

        /* Vignette */
        .vignette {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 999;
            background: radial-gradient(ellipse at center, transparent 0%, rgba(0, 0, 0, 0.6) 100%);
        }
    </style>
</head>
<body>
    <!-- Background Elements -->
    <div class="background-container"></div>
    <canvas id="particle-canvas"></canvas>
    <div class="scanlines"></div>
    <div class="vignette"></div>

    <!-- Main Container -->
    <div class="main-container">
        <!-- Left Panel - Menu -->
        <div class="left-panel">
            <div class="title-container">
                <div class="wing-effect">
                    <div class="wing-left"></div>
                    <div class="wing-right"></div>
                </div>
                <h1 class="aarush-title">AARUSH</h1>
            </div>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="openLoadout()">START</button>
                <button class="menu-btn" onclick="openContact()">CONTACT</button>
            </div>
        </div>

        <!-- Right Panel - Mini Game -->
        <div class="right-panel">
            <canvas id="game-canvas"></canvas>
            <div class="game-overlay">
                TAP / SPACEBAR TO JUMP
                <span>AVOID THE SPIKES</span>
            </div>
        </div>
    </div>

    <!-- Loadout Screen -->
    <div class="loadout-screen" id="loadoutScreen">
        <div class="loadout-content">
            <h2 class="loadout-title">LOADOUT // PROFILE</h2>
            <div class="about-section">
                <p class="about-text">
                    I'm a Web Developer and AI enthusiast pushing for the top tier.
                </p>
            </div>
            <div class="projects-section">
                <h3 style="font-family: 'Cinzel Decorative'; font-size: 1.8rem; color: #ff0032; margin-bottom: 25px; letter-spacing: 2px;">MY PROJECTS</h3>
                <div class="project-links">
                    <a href="https://thisgamemightbescaryoridk.netlify.app/" target="_blank" class="project-link">Horror Game</a>
                    <a href="https://orbit-477142372341.us-west1.run.app/" target="_blank" class="project-link">Study App</a>
                    <a href="#" class="project-link">AI Agents Intensive</a>
                </div>
            </div>
            <button class="back-btn" onclick="closeLoadout()">BACK TO MAIN MENU</button>
        </div>
    </div>

    <!-- Contact Modal -->
    <div class="modal-overlay" id="contactModal">
        <div class="modal-content">
            <h2 class="modal-title">CONTACT</h2>
            <a href="https://instagram.com/ae9sj" target="_blank" class="contact-link">
                INSTAGRAM: @ae9sj
            </a>
            <br>
            <button class="close-btn" onclick="closeContact()">CLOSE</button>
        </div>
    </div>

    <script>
        // Particle System - Glowing Embers/Ash
        const particleCanvas = document.getElementById('particle-canvas');
        const particleCtx = particleCanvas.getContext('2d');

        let particles = [];
        const particleCount = 150;

        function resizeParticleCanvas() {
            particleCanvas.width = window.innerWidth;
            particleCanvas.height = window.innerHeight;
        }

        resizeParticleCanvas();
        window.addEventListener('resize', resizeParticleCanvas);

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.x = Math.random() * particleCanvas.width;
                this.y = particleCanvas.height + Math.random() * 100;
                this.size = Math.random() * 3 + 1;
                this.speedY = Math.random() * 1.5 + 0.5;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.opacity = Math.random() * 0.6 + 0.2;
                this.hue = Math.random() > 0.7 ? 0 : Math.random() * 30 + 345;
                this.saturation = Math.random() * 40 + 60;
                this.lightness = Math.random() * 30 + 50;
            }

            update() {
                this.y -= this.speedY;
                this.x += this.speedX;
                this.opacity -= 0.002;

                if (this.y < -50 || this.opacity <= 0) {
                    this.reset();
                }
            }

            draw() {
                particleCtx.beginPath();
                particleCtx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                particleCtx.fillStyle = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, ${this.opacity})`;
                particleCtx.shadowBlur = 15;
                particleCtx.shadowColor = `hsla(${this.hue}, ${this.saturation}%, ${this.lightness}%, 0.8)`;
                particleCtx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            particleCtx.clearRect(0, 0, particleCanvas.width, particleCanvas.height);
            
            particles.forEach(particle => {
                particle.update();
                particle.draw();
            });

            requestAnimationFrame(animateParticles);
        }

        animateParticles();

        // Mini Game - Enhanced Graphics
        const gameCanvas = document.getElementById('game-canvas');
        const gameCtx = gameCanvas.getContext('2d');

        let gameWidth, gameHeight;
        let player, obstacles, gameRunning, score, animationId;

        function resizeGameCanvas() {
            const rect = gameCanvas.parentElement.getBoundingClientRect();
            gameCanvas.width = rect.width;
            gameCanvas.height = rect.height;
            gameWidth = gameCanvas.width;
            gameHeight = gameCanvas.height;
        }

        resizeGameCanvas();
        window.addEventListener('resize', resizeGameCanvas);

        class Player {
            constructor() {
                this.width = 40;
                this.height = 60;
                this.x = 80;
                this.y = gameHeight - this.height - 20;
                this.velocityY = 0;
                this.gravity = 0.8;
                this.jumpPower = -18;
                this.isJumping = false;
                this.rotation = 0;
            }

            jump() {
                if (!this.isJumping) {
                    this.velocityY = this.jumpPower;
                    this.isJumping = true;
                }
            }

            update() {
                this.velocityY += this.gravity;
                this.y += this.velocityY;

                if (this.y >= gameHeight - this.height - 20) {
                    this.y = gameHeight - this.height - 20;
                    this.velocityY = 0;
                    this.isJumping = false;
                    this.rotation = 0;
                } else {
                    this.rotation = Math.min(Math.max(this.velocityY * 2, -30), 30);
                }
            }

            draw() {
                gameCtx.save();
                gameCtx.translate(this.x + this.width / 2, this.y + this.height / 2);
                gameCtx.rotate(this.rotation * Math.PI / 180);

                const gradient = gameCtx.createLinearGradient(-this.width/2, -this.height/2, this.width/2, this.height/2);
                gradient.addColorStop(0, '#00ffff');
                gradient.addColorStop(0.5, '#ffffff');
                gradient.addColorStop(1, '#00ffff');

                gameCtx.fillStyle = gradient;
                gameCtx.shadowBlur = 20;
                gameCtx.shadowColor = '#00ffff';

                gameCtx.beginPath();
                gameCtx.moveTo(-this.width/2, this.height/2);
                gameCtx.lineTo(-this.width/4, -this.height/2);
                gameCtx.lineTo(0, -this.height/2 - 15);
                gameCtx.lineTo(this.width/4, -this.height/2);
                gameCtx.lineTo(this.width/2, this.height/2);
                gameCtx.lineTo(0, this.height/2 - 10);
                gameCtx.closePath();
                gameCtx.fill();

                gameCtx.fillStyle = 'rgba(255, 255, 255, 0.8)';
                gameCtx.shadowBlur = 10;
                gameCtx.beginPath();
                gameCtx.moveTo(-this.width/6, this.height/4);
                gameCtx.lineTo(0, -this.height/4);
                gameCtx.lineTo(this.width/6, this.height/4);
                gameCtx.closePath();
                gameCtx.fill();

                gameCtx.restore();
            }
        }

        class Obstacle {
            constructor() {
                this.width = Math.random() * 30 + 40;
                this.height = Math.random() * 40 + 50;
                this.x = gameWidth;
                this.y = gameHeight - this.height - 20;
                this.speed = 6 + Math.random() * 3;
                this.spikeCount = Math.floor(this.width / 15);
            }

            update() {
                this.x -= this.speed;
            }

            draw() {
                gameCtx.save();
                
                const gradient = gameCtx.createLinearGradient(this.x, this.y, this.x, this.y + this.height);
                gradient.addColorStop(0, '#2a2a3a');
                gradient.addColorStop(0.5, '#1a1a2a');
                gradient.addColorStop(1, '#0a0a1a');

                gameCtx.fillStyle = gradient;
                gameCtx.shadowBlur = 10;
                gameCtx.shadowColor = '#ff0032';

                gameCtx.beginPath();
                gameCtx.moveTo(this.x, this.y + this.height);
                
                for (let i = 0; i <= this.spikeCount; i++) {
                    const spikeX = this.x + (i * this.width / this.spikeCount);
                    const spikeY = i % 2 === 0 ? this.y : this.y + this.height * 0.3;
                    gameCtx.lineTo(spikeX, spikeY);
                }

                gameCtx.lineTo(this.x + this.width, this.y + this.height);
                gameCtx.closePath();
                gameCtx.fill();

                gameCtx.strokeStyle = '#ff0032';
                gameCtx.lineWidth = 2;
                gameCtx.shadowBlur = 5;
                gameCtx.stroke();

                gameCtx.restore();
            }
        }

        function initGame() {
            player = new Player();
            obstacles = [];
            score = 0;
            gameRunning = true;
            spawnObstacle();
            gameLoop();
        }

        function spawnObstacle() {
            if (!gameRunning) return;
            
            obstacles.push(new Obstacle());
            
            const nextSpawn = 1500 + Math.random() * 1500;
            setTimeout(spawnObstacle, nextSpawn);
        }

        function checkCollision(player, obstacle) {
            const playerHitbox = {
                x: player.x + 10,
                y: player.y + 10,
                width: player.width - 20,
                height: player.height - 20
            };

            return playerHitbox.x < obstacle.x + obstacle.width &&
                   playerHitbox.x + playerHitbox.width > obstacle.x &&
                   playerHitbox.y < obstacle.y + obstacle.height &&
                   playerHitbox.y + playerHitbox.height > obstacle.y;
        }

        function gameLoop() {
            if (!gameRunning) return;

            gameCtx.clearRect(0, 0, gameWidth, gameHeight);

            gameCtx.strokeStyle = '#ff0032';
            gameCtx.lineWidth = 2;
            gameCtx.shadowBlur = 10;
            gameCtx.shadowColor = '#ff0032';
            gameCtx.beginPath();
            gameCtx.moveTo(0, gameHeight - 20);
            gameCtx.lineTo(gameWidth, gameHeight - 20);
            gameCtx.stroke();

            player.update();
            player.draw();

            obstacles.forEach((obstacle, index) => {
                obstacle.update();
                obstacle.draw();

                if (checkCollision(player, obstacle)) {
                    gameRunning = false;
                    setTimeout(initGame, 1000);
                }

                if (obstacle.x + obstacle.width < 0) {
                    obstacles.splice(index, 1);
                    score++;
                }
            });

            gameCtx.fillStyle = '#fff';
            gameCtx.font = 'bold 24px Teko';
            gameCtx.shadowBlur = 10;
            gameCtx.shadowColor = '#00ffff';
            gameCtx.fillText(`SCORE: ${score}`, gameWidth - 150, 40);

            animationId = requestAnimationFrame(gameLoop);
        }

        function handleJump() {
            if (player && !player.isJumping) {
                player.jump();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                handleJump();
            }
        });

        gameCanvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            handleJump();
        });

        gameCanvas.addEventListener('click', () => {
            handleJump();
        });

        initGame();

        function openLoadout() {
            document.getElementById('loadoutScreen').classList.add('active');
        }

        function closeLoadout() {
            document.getElementById('loadoutScreen').classList.remove('active');
        }

        function openContact() {
            document.getElementById('contactModal').classList.add('active');
        }

        function closeContact() {
            document.getElementById('contactModal').classList.remove('active');
        }

        document.getElementById('contactModal').addEventListener('click', (e) => {
            if (e.target.id === 'contactModal') {
                closeContact();
            }
        });
    </script>
</body>
</html>
