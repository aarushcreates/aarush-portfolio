<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aarush - Portfolio</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        @import url('https://fonts.googleapis.com/css2?family=Metal+Mania&family=Russo+One&display=swap');

        body {
            font-family: 'Russo One', sans-serif;
            overflow: hidden;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 50%, #0d1117 100%);
            min-height: 100vh;
            color: #fff;
        }

        .bg-particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }

        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(100, 200, 255, 0.3);
            border-radius: 50%;
            animation: float 15s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh) rotate(720deg); opacity: 0; }
        }

        .main-container {
            display: flex;
            height: 100vh;
            position: relative;
            z-index: 1;
        }

        .left-side {
            width: 50%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            padding-left: 80px;
            background: linear-gradient(90deg, rgba(10, 14, 26, 0.9) 0%, rgba(10, 14, 26, 0.7) 100%);
            position: relative;
        }

        .logo-container {
            margin-bottom: 60px;
            position: relative;
        }

        .logo {
            font-family: 'Metal Mania', cursive;
            font-size: 5rem;
            text-transform: uppercase;
            letter-spacing: 8px;
            position: relative;
            display: inline-block;
        }

        .logo-text {
            background: linear-gradient(180deg, #e8e8e8 0%, #a0a0a0 30%, #606060 60%, #404040 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 10px rgba(255, 255, 255, 0.5));
            position: relative;
            z-index: 2;
        }

        .logo::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 120%;
            height: 80%;
            background: radial-gradient(ellipse at center, rgba(220, 20, 60, 0.4) 0%, transparent 70%);
            z-index: 1;
            filter: blur(20px);
        }

        .logo::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 140%;
            height: 100%;
            background: radial-gradient(ellipse at center, rgba(0, 255, 255, 0.3) 0%, transparent 70%);
            z-index: 0;
            filter: blur(30px);
        }

        .wing-effect {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 200px;
            height: 100px;
            z-index: 0;
        }

        .wing-left {
            position: absolute;
            left: -80px;
            top: 20px;
            width: 100px;
            height: 60px;
            background: linear-gradient(135deg, rgba(220, 20, 60, 0.6) 0%, rgba(0, 255, 255, 0.4) 100%);
            clip-path: polygon(0 50%, 100% 0, 80% 50%, 100% 100%);
            filter: blur(10px);
            animation: wingPulse 2s ease-in-out infinite;
        }

        .wing-right {
            position: absolute;
            right: -80px;
            top: 20px;
            width: 100px;
            height: 60px;
            background: linear-gradient(225deg, rgba(220, 20, 60, 0.6) 0%, rgba(0, 255, 255, 0.4) 100%);
            clip-path: polygon(0 0, 100% 50%, 20% 50%, 0 100%);
            filter: blur(10px);
            animation: wingPulse 2s ease-in-out infinite reverse;
        }

        @keyframes wingPulse {
            0%, 100% { opacity: 0.6; transform: scaleY(1); }
            50% { opacity: 1; transform: scaleY(1.1); }
        }

        .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 25px;
        }

        .menu-btn {
            font-family: 'Russo One', sans-serif;
            font-size: 2rem;
            color: #fff;
            background: transparent;
            border: none;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 4px;
            padding: 15px 40px;
            position: relative;
            transition: all 0.3s ease;
            text-align: left;
        }

        .menu-btn::before {
            content: '';
            position: absolute;
            left: 0;
            top: 50%;
            transform: translateY(-50%);
            width: 0;
            height: 3px;
            background: linear-gradient(90deg, #dc143c, #00ffff);
            transition: width 0.3s ease;
        }

        .menu-btn::after {
            content: '';
            position: absolute;
            right: 0;
            bottom: 0;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            transform: scaleX(0);
            transition: transform 0.3s ease;
        }

        .menu-btn:hover {
            color: #00ffff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.8);
            padding-left: 50px;
        }

        .menu-btn:hover::before {
            width: 100%;
        }

        .menu-btn:hover::after {
            transform: scaleX(1);
        }

        .right-side {
            width: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(90deg, rgba(10, 14, 26, 0.7) 0%, rgba(10, 14, 26, 0.9) 100%);
            position: relative;
            overflow: hidden;
        }

        #gameCanvas {
            border: 3px solid rgba(0, 255, 255, 0.3);
            background: linear-gradient(180deg, #0a0e1a 0%, #1a2332 100%);
            box-shadow: 0 0 30px rgba(0, 255, 255, 0.2);
        }

        .game-instructions {
            position: absolute;
            bottom: 20px;
            right: 20px;
            font-size: 0.8rem;
            color: rgba(255, 255, 255, 0.5);
            text-align: right;
        }

        .loadout-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #0a0e1a 0%, #1a1f2e 100%);
            z-index: 100;
            display: none;
            opacity: 0;
            transform: translateX(100%);
            transition: all 0.5s ease;
            overflow-y: auto;
        }

        .loadout-screen.active {
            display: block;
            opacity: 1;
            transform: translateX(0);
        }

        .loadout-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 40px;
        }

        .loadout-title {
            font-family: 'Metal Mania', cursive;
            font-size: 3.5rem;
            text-align: center;
            margin-bottom: 40px;
            background: linear-gradient(180deg, #e8e8e8 0%, #a0a0a0 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .about-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.2);
            padding: 30px;
            margin-bottom: 40px;
            border-radius: 5px;
        }

        .about-section h2 {
            font-size: 1.8rem;
            color: #00ffff;
            margin-bottom: 15px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .about-section p {
            font-size: 1.1rem;
            line-height: 1.8;
            color: rgba(255, 255, 255, 0.9);
        }

        .projects-section {
            margin-bottom: 40px;
        }

        .projects-section h2 {
            font-size: 1.8rem;
            color: #dc143c;
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .project-card {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(220, 20, 60, 0.3);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 5px;
            transition: all 0.3s ease;
        }

        .project-card:hover {
            border-color: #dc143c;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.3);
            transform: translateX(10px);
        }

        .project-card h3 {
            font-size: 1.4rem;
            color: #fff;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .project-card a {
            display: inline-block;
            color: #00ffff;
            text-decoration: none;
            font-size: 1rem;
            padding: 8px 20px;
            border: 1px solid #00ffff;
            border-radius: 3px;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .project-card a:hover {
            background: #00ffff;
            color: #0a0e1a;
            box-shadow: 0 0 15px rgba(0, 255, 255, 0.5);
        }

        .back-btn {
            font-family: 'Russo One', sans-serif;
            font-size: 1.3rem;
            color: #fff;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 15px 50px;
            display: block;
            margin: 40px auto 0;
            transition: all 0.3s ease;
        }

        .back-btn:hover {
            border-color: #dc143c;
            color: #dc143c;
            box-shadow: 0 0 20px rgba(220, 20, 60, 0.4);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 200;
            display: none;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px);
        }

        .modal-overlay.active {
            display: flex;
        }

        .contact-modal {
            background: linear-gradient(135deg, rgba(10, 14, 26, 0.95) 0%, rgba(26, 31, 46, 0.95) 100%);
            border: 2px solid rgba(220, 20, 60, 0.5);
            padding: 50px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 0 50px rgba(220, 20, 60, 0.3);
            max-width: 400px;
            width: 90%;
        }

        .contact-modal h2 {
            font-family: 'Metal Mania', cursive;
            font-size: 2.5rem;
            color: #dc143c;
            margin-bottom: 30px;
            text-transform: uppercase;
        }

        .contact-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
            color: #fff;
            text-decoration: none;
            font-size: 1.3rem;
            padding: 20px;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 5px;
            margin-bottom: 30px;
            transition: all 0.3s ease;
        }

        .contact-link:hover {
            background: rgba(0, 255, 255, 0.1);
            border-color: #00ffff;
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.3);
        }

        .contact-link svg {
            width: 30px;
            height: 30px;
            fill: #dc143c;
        }

        .close-btn {
            font-family: 'Russo One', sans-serif;
            font-size: 1.2rem;
            color: #fff;
            background: transparent;
            border: 2px solid rgba(255, 255, 255, 0.3);
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 3px;
            padding: 12px 40px;
            transition: all 0.3s ease;
        }

        .close-btn:hover {
            border-color: #dc143c;
            color: #dc143c;
        }

        .fade-out {
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
            }

            .left-side, .right-side {
                width: 100%;
                height: 50vh;
            }

            .left-side {
                padding-left: 30px;
                justify-content: flex-start;
                padding-top: 40px;
            }

            .logo {
                font-size: 3.5rem;
            }

            .menu-btn {
                font-size: 1.5rem;
                padding: 10px 30px;
            }

            #gameCanvas {
                width: 90%;
                height: 70%;
            }

            .game-instructions {
                font-size: 0.6rem;
                bottom: 10px;
                right: 10px;
            }

            .loadout-content {
                padding: 30px 20px;
            }

            .loadout-title {
                font-size: 2.5rem;
            }

            .contact-modal {
                padding: 30px 20px;
            }
        }
    </style>
</head>
<body>
    <div class="bg-particles" id="bgParticles"></div>

    <div class="main-container" id="mainContainer">
        <div class="left-side">
            <div class="logo-container">
                <div class="wing-effect">
                    <div class="wing-left"></div>
                    <div class="wing-right"></div>
                </div>
                <h1 class="logo">
                    <span class="logo-text">AARUSH</span>
                </h1>
            </div>
            <div class="menu-buttons">
                <button class="menu-btn" onclick="showLoadout()">START</button>
                <button class="menu-btn" onclick="showContact()">CONTACT</button>
            </div>
        </div>

        <div class="right-side">
            <canvas id="gameCanvas"></canvas>
            <div class="game-instructions">
                TAP or SPACE to Jump
            </div>
        </div>
    </div>

    <div class="loadout-screen" id="loadoutScreen">
        <div class="loadout-content">
            <h1 class="loadout-title">LOADOUT // PLAYER PROFILE</h1>
            
            <div class="about-section">
                <h2>// ABOUT ME</h2>
                <p>I'm a Web Developer and AI enthusiast pushing for the top tier.</p>
            </div>

            <div class="projects-section">
                <h2>// MY PROJECTS</h2>
                
                <div class="project-card">
                    <h3>Horror Game</h3>
                    <a href="https://thisgamemightbescaryoridk.netlify.app/" target="_blank">PLAY NOW</a>
                </div>

                <div class="project-card">
                    <h3>Study App</h3>
                    <a href="https://orbit-477142372341.us-west1.run.app/" target="_blank">OPEN APP</a>
                </div>

                <div class="project-card">
                    <h3>AI Agents Intensive</h3>
                    <a href="#" style="opacity: 0.5; cursor: default;">COMING SOON</a>
                </div>
            </div>

            <button class="back-btn" onclick="backToMenu()">BACK TO MAIN MENU</button>
        </div>
    </div>

    <div class="modal-overlay" id="contactModal">
        <div class="contact-modal">
            <h2>CONTACT</h2>
            <a href="https://instagram.com/ae9sj" target="_blank" class="contact-link">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">

                </svg>
                @ae9sj
            </a>
            <button class="close-btn" onclick="closeContact()">CLOSE</button>
        </div>
    </div>

    <script>
        function createParticles() {
            const container = document.getElementById('bgParticles');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 15 + 's';
                particle.style.animationDuration = (Math.random() * 10 + 10) + 's';
                container.appendChild(particle);
            }
        }
        createParticles();

        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        function resizeCanvas() {
            const container = canvas.parentElement;
            canvas.width = container.clientWidth * 0.9;
            canvas.height = container.clientHeight * 0.7;
        }
        resizeCanvas();
        window.addEventListener('resize', resizeCanvas);

        let gameRunning = true;
        let player = {
            x: 50,
            y: 0,
            width: 40,
            height: 40,
            velocityY: 0,
            gravity: 0.8,
            jumpForce: -15,
            grounded: false
        };

        let obstacles = [];
        let score = 0;
        let frameCount = 0;
        let gameSpeed = 5;

        player.y = canvas.height - player.height;

        function jump() {
            if (player.grounded) {
                player.velocityY = player.jumpForce;
                player.grounded = false;
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.code === 'Space') {
                e.preventDefault();
                if (gameRunning) jump();
            }
        });

        canvas.addEventListener('touchstart', (e) => {
            e.preventDefault();
            if (gameRunning) jump();
        });

        canvas.addEventListener('click', () => {
            if (gameRunning) jump();
        });

        function spawnObstacle() {
            const height = Math.random() * 60 + 40;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - height,
                width: 30,
                height: height
            });
        }

        function updateGame() {
            if (!gameRunning) return;

            ctx.clearRect(0, 0, canvas.width, canvas.height);

            ctx.fillStyle = '#1a2332';
            ctx.fillRect(0, canvas.height - 5, canvas.width, 5);

            player.velocityY += player.gravity;
            player.y += player.velocityY;

            if (player.y >= canvas.height - player.height) {
                player.y = canvas.height - player.height;
                player.velocityY = 0;
                player.grounded = true;
            }

            ctx.shadowBlur = 20;
            ctx.shadowColor = '#00ffff';
            ctx.fillStyle = '#00ffff';
            ctx.fillRect(player.x, player.y, player.width, player.height);
            ctx.shadowBlur = 0;

            frameCount++;
            if (frameCount % 90 === 0) {
                spawnObstacle();
                score++;
                if (score % 5 === 0) gameSpeed += 0.5;
            }

            ctx.shadowBlur = 15;
            ctx.shadowColor = '#dc143c';
            ctx.fillStyle = '#dc143c';

            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= gameSpeed;

                ctx.fillRect(obs.x, obs.y, obs.width, obs.height);

                if (
                    player.x < obs.x + obs.width &&
                    player.x + player.width > obs.x &&
                    player.y < obs.y + obs.height &&
                    player.y + player.height > obs.y
                ) {
                    obstacles = [];
                    score = 0;
                    gameSpeed = 5;
                    frameCount = 0;
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                }
            }
            ctx.shadowBlur = 0;

            ctx.fillStyle = '#fff';
            ctx.font = '20px Russo One';
            ctx.fillText('SCORE: ' + score, 20, 30);

            requestAnimationFrame(updateGame);
        }

        updateGame();

        function showLoadout() {
            document.getElementById('mainContainer').classList.add('fade-out');
            setTimeout(() => {
                document.getElementById('loadoutScreen').classList.add('active');
            }, 500);
        }

        function backToMenu() {
            document.getElementById('loadoutScreen').classList.remove('active');
            setTimeout(() => {
                document.getElementById('mainContainer').classList.remove('fade-out');
            }, 500);
        }

        function showContact() {
            document.getElementById('contactModal').classList.add('active');
        }

        function closeContact() {
            document.getElementById('contactModal').classList.remove('active');
        }

        document.getElementById('contactModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('contactModal')) {
                closeContact();
            }
        });
    </script>
</body>
</html>
